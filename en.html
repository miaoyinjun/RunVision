<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sprint Vision (极速开跑) - Camera Running Game | Play Free Online</title>
    <meta
      name="description"
      content="Sprint Vision (极速开跑) is a free browser game powered by your camera and MediaPipe pose tracking. Run in place to boost your speed and race against the AI."
    />
    <link rel="canonical" href="https://run.withmiao.com/en.html" />
    <link rel="alternate" href="https://run.withmiao.com/" hreflang="zh-CN" />
    <link rel="alternate" href="https://run.withmiao.com/en.html" hreflang="en" />
    <link rel="alternate" href="https://run.withmiao.com/" hreflang="x-default" />
    <meta name="robots" content="index,follow,max-image-preview:large" />
    <meta name="theme-color" content="#0b1220" />

    <meta property="og:title" content="Sprint Vision (极速开跑) - Camera Running Game" />
    <meta
      property="og:description"
      content="Run in place in front of your camera. Pose tracking turns your steps into speed. Race the AI for free."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://run.withmiao.com/en.html" />
    <meta property="og:locale" content="en_US" />

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Sprint Vision (极速开跑) - Camera Running Game" />
    <meta
      name="twitter:description"
      content="Run in place in front of your camera. Pose tracking turns your steps into speed. Race the AI for free."
    />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "VideoGame",
        "name": "Sprint Vision (极速开跑)",
        "description": "A free browser game powered by your camera and MediaPipe pose tracking. Run in place to boost your speed and race against the AI.",
        "url": "https://run.withmiao.com/en.html",
        "inLanguage": "en",
        "applicationCategory": "GameApplication",
        "operatingSystem": "Web",
        "isAccessibleForFree": true,
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD",
          "availability": "https://schema.org/InStock"
        }
      }
    </script>

    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />
    <link rel="dns-prefetch" href="https://storage.googleapis.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Noto+Sans+SC:wght@500;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="arena">
      <section class="race-panel" aria-label="Running race">
        <div class="track-header">
          <div>
            <p class="kicker">Camera Sprint Duel</p>
            <h1>Sprint Vision</h1>
          </div>
          <div class="header-tools">
            <a class="lang-switch" href="/" lang="zh-CN" hreflang="zh-CN" aria-label="Switch to Chinese page">中文</a>
            <div class="clock" aria-live="polite">
              <span id="timeLeft">30.0</span>
              <small>sec</small>
            </div>
          </div>
        </div>

        <div class="stadium" aria-label="Track">
          <div class="finish-line" aria-hidden="true"></div>
          <div class="countdown-burst" id="countdownBurst" aria-hidden="true">3</div>
          <div class="finish-burst" id="finishBurst" aria-hidden="true">
            <span id="finishText">WIN</span>
          </div>
          <div class="lane lane-ai">
            <div class="lane-label">AI</div>
            <div class="runner ai-runner" id="aiRunner" aria-hidden="true">
              <span class="head"></span>
              <span class="body"></span>
              <span class="arm arm-a"></span>
              <span class="arm arm-b"></span>
              <span class="leg leg-a"></span>
              <span class="leg leg-b"></span>
            </div>
          </div>
          <div class="lane lane-player">
            <div class="lane-label">You</div>
            <div class="runner player-runner" id="playerRunner" aria-hidden="true">
              <span class="head"></span>
              <span class="body"></span>
              <span class="arm arm-a"></span>
              <span class="arm arm-b"></span>
              <span class="leg leg-a"></span>
              <span class="leg leg-b"></span>
            </div>
          </div>
        </div>

        <div class="scoreboard" aria-label="Race stats">
          <div>
            <span id="playerMeters">0</span>
            <small>Player meters</small>
          </div>
          <div>
            <span id="cadence">0</span>
            <small>Cadence</small>
          </div>
          <div>
            <span id="aiMeters">0</span>
            <small>AI meters</small>
          </div>
        </div>
      </section>

      <aside class="control-panel" aria-label="Camera controls">
        <div class="camera-shell">
          <video id="camera" playsinline muted></video>
          <canvas id="overlay"></canvas>
          <div class="camera-status" id="cameraStatus">Waiting for camera</div>
        </div>

        <div class="action-row">
          <button class="primary" id="gameActionBtn" type="button">Enable camera</button>
        </div>

        <div class="result" id="result" role="status" aria-live="polite">
          Stand in front of the camera. Enable the camera and run in place. Clearer steps make you faster in-game.
        </div>

        <div class="tuning">
          <label for="difficulty">AI speed</label>
          <input id="difficulty" type="range" min="6" max="13" step="0.5" value="9" />
          <span id="difficultyValue">9.0 m/s</span>
        </div>
      </aside>
    </main>

    <script type="module" src="./game.js"></script>
  </body>
</html>
